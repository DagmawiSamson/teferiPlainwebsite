[[redirects]]
  from = "/410.html"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

# Catch-all: permanently redirect any unknown URL to homepage.
# IMPORTANT: status 301 (not 200) prevents Google from indexing duplicate URLs
# that all serve the same index.html content.
[[redirects]]
  from = "/*"
  to = "/"
  status = 301
