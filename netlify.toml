[build]
  # No build command needed for static HTML/CSS/JS site
  command = ""
  # Publish the root directory where index.html is located
  publish = "."

# Return 410 Gone for permanently removed pages (tells Google these pages are gone forever)
[[redirects]]
  from = "/contact-us"
  to = "/"
  status = 410

[[redirects]]
  from = "/services"
  to = "/"
  status = 410

[[redirects]]
  from = "/service-area"
  to = "/"
  status = 410

[[redirects]]
  from = "/services/commercial-services"
  to = "/"
  status = 410

[[redirects]]
  from = "/services/automotive-services"
  to = "/"
  status = 410

[[redirects]]
  from = "/services/residential-services"
  to = "/"
  status = 410

# Catch-all redirect for any other paths to main page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

