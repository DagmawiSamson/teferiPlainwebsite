[build]
  # No build command needed for static HTML/CSS/JS site
  command = ""
  # Publish the root directory where index.html is located
  publish = "."

# Return 410 Gone for permanently removed pages using Netlify Function
[[redirects]]
  from = "/contact-us"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/service-area"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services/commercial-services"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services/automotive-services"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services/residential-services"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

# Catch-all redirect for any other paths to main page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

