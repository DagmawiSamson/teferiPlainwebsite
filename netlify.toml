[build]
  # No build command needed for static HTML/CSS/JS site
  command = ""
  # Publish the root directory where index.html is located
  publish = "."

# Redirect non-www to www (permanent)
[[redirects]]
  from = "https://locksmithta.com/*"
  to = "https://www.locksmithta.com/:splat"
  status = 301
  force = true

# Return 410 Gone for permanently removed pages (without .html extension)
[[redirects]]
  from = "/contact-us"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/contact-us.html"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services.html"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/service-area"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/service-area.html"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services/commercial-services"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services/commercial-services.html"
  to = "/.netlify/functions/410gone"
  status = 200
  force = true

[[redirects]]
  from = "/services/automotive-services"
